<div class="page-wrapper">
    <!-- Blue decorative blobs (top-right & bottom-left) -->
    <div class="blob blob-top-right"></div>
    <div class="blob blob-bottom-left"></div>

    <div class="card-container">

        <!-- LEFT SIDE — Illustration -->
        <div class="illustration-side">
            <img src="/Forgot_password-rafiki.png" alt="Forgot Password Illustration"
    class="illustration-img" />
        </div>

        <!-- RIGHT SIDE — Form -->
        <div class="form-side">
            <h1 class="title">Forgot<br />Your Password ?</h1>

            <ng-container *ngIf="!submitted; else successBlock">
                <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="form">

                    <mat-form-field appearance="outline" class="email-field">
                        <mat-label>Email Address</mat-label>
                        <input matInput type="email" formControlName="email" placeholder="Enter your email" />
                        <mat-error *ngIf="forgotForm.get('email')?.hasError('required')">
                            Email is required
                        </mat-error>
                        <mat-error *ngIf="forgotForm.get('email')?.hasError('email')">
                            Enter a valid email address
                        </mat-error>
                    </mat-form-field>

                    <button mat-raised-button type="submit" class="reset-btn" [disabled]="loading">
                        <span *ngIf="!loading">RESET PASSWORD</span>
                        <span *ngIf="loading" class="loading-dots">
                            <span></span><span></span><span></span>
                        </span>
                    </button>

                    <a href="#" class="back-link">Back to signin</a>
                </form>
            </ng-container>

            <ng-template #successBlock>
                <div class="success-message">
                    <mat-icon class="success-icon">mark_email_read</mat-icon>
                    <p>Check your email! We've sent a password reset link to <strong>{{ forgotForm.get('email')?.value
                            }}</strong>.</p>
                    <a href="#" class="back-link">Back to signin</a>
                </div>
            </ng-template>
        </div>

    </div>
</div>
